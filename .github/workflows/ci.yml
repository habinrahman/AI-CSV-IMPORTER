name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # shared must exist before anything that imports @groweasy/shared
      - name: Build shared
        run: npm run build --workspace shared

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build backend
        run: npm run build --workspace backend

      - name: Build frontend
        run: npm run build --workspace frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_TELEMETRY_DISABLED: 1

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build all workspaces
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_TELEMETRY_DISABLED: 1

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # Boots both built servers and drives a real browser through the
      # upload → preview → confirm → error-path journey (no AI key needed).
      - name: Run E2E journeys
        run: npm run test:e2e --workspace frontend
