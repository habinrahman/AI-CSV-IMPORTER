# Local production-like orchestration of the full stack.
#   docker compose up --build
# Frontend → http://localhost:3000   Backend → http://localhost:4000
# Provide OPENAI_API_KEY via a root .env file or the shell environment.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: groweasy-backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-60000}
      AI_CONCURRENCY: ${AI_CONCURRENCY:-2}
      BATCH_SIZE: ${BATCH_SIZE:-20}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-4}
      PROMPT_VERSION: ${PROMPT_VERSION:-v2}
      DEFAULT_PHONE_REGION: ${DEFAULT_PHONE_REGION:-IN}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-5}
      UPLOAD_TTL_MINUTES: ${UPLOAD_TTL_MINUTES:-30}
      JOB_TTL_MINUTES: ${JOB_TTL_MINUTES:-60}
      # Optional Supabase persistence; in-memory mode when empty.
      DATABASE_URL: ${DATABASE_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* must be present at build time (baked into the client bundle).
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: groweasy-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
